# Copy this file → rename it to secrets.toml (in the same .streamlit/ folder)
# Fill in your values. secrets.toml is gitignored — never commit it.
# On Streamlit Cloud, paste these same key/values in the Secrets editor (no file needed).

[gcp_service_account]
type                        = "service_account"
project_id                  = "your-project-id"
private_key_id              = "your-key-id"
private_key                 = "-----BEGIN PRIVATE KEY-----\nPASTE_YOUR_KEY_HERE\n-----END PRIVATE KEY-----\n"
client_email                = "taskflow@your-project-id.iam.gserviceaccount.com"
client_id                   = "123456789012345678901"
auth_uri                    = "https://accounts.google.com/o/oauth2/auth"
token_uri                   = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url        = "https://www.googleapis.com/robot/v1/metadata/x509/taskflow%40your-project-id.iam.gserviceaccount.com"

# The long ID in your Google Sheet URL:
# https://docs.google.com/spreadsheets/d/  THIS_PART  /edit
spreadsheet_id = "your-google-sheet-id-here"
